version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./cyberguard.db
      - SECRET_KEY=demo_secret_key_change_me
    volumes:
      - ./cyberguard.db:/app/cyberguard.db
    restart: always

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always
