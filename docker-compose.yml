version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://cyberguard:cyberguard@db:5432/cyberguard
      - SECRET_KEY=demo_secret_key_change_me
      - REDIS_ENABLED=True
      - REDIS_URL=redis://redis:6379/0
      - CELERY_ENABLED=True
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASSWORD=
      - SMTP_TLS=true
      - SMTP_FROM=alerts@cyberguard.ai
    depends_on:
      - db
      - redis
    restart: always

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=cyberguard
      - POSTGRES_USER=cyberguard
      - POSTGRES_PASSWORD=cyberguard
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: always

  celery_worker:
    build: .
    command: celery -A src.workers.celery_app worker -Q high_priority,default,low_priority --loglevel=info
    environment:
      - DATABASE_URL=postgresql+psycopg2://cyberguard:cyberguard@db:5432/cyberguard
      - REDIS_ENABLED=True
      - REDIS_URL=redis://redis:6379/0
      - CELERY_ENABLED=True
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - backend
      - db
      - redis
    restart: always

  celery_beat:
    build: .
    command: celery -A src.workers.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+psycopg2://cyberguard:cyberguard@db:5432/cyberguard
      - REDIS_ENABLED=True
      - REDIS_URL=redis://redis:6379/0
      - CELERY_ENABLED=True
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - backend
      - db
      - redis
    restart: always

  flower:
    image: mher/flower
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - FLOWER_PORT=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    restart: always

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always

volumes:
  redis_data:
  pg_data:
